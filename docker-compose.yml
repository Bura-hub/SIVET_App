version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: mte_lumen_postgres
    environment:
      POSTGRES_DB: ${name_db:-mte_lumen}
      POSTGRES_USER: ${user_postgres:-mte_user}
      POSTGRES_PASSWORD: ${password_user_postgres:-mte_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - mte_lumen_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${user_postgres:-mte_user} -d ${name_db:-mte_lumen}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para Celery
  redis:
    image: redis:7-alpine
    container_name: mte_lumen_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mte_lumen_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Django
  backend:
    build: .
    container_name: mte_lumen_backend
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - name_db=${name_db:-mte_lumen}
      - user_postgres=${user_postgres:-mte_user}
      - password_user_postgres=${password_user_postgres:-mte_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SCADA_USERNAME=${SCADA_USERNAME}
      - SCADA_PASSWORD=${SCADA_PASSWORD}
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mte_lumen_network
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              python manage.py runserver 0.0.0.0:8000"

  # Worker de Celery
  celery_worker:
    build: .
    container_name: mte_lumen_celery_worker
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - name_db=${name_db:-mte_lumen}
      - user_postgres=${user_postgres:-mte_user}
      - password_user_postgres=${password_user_postgres:-mte_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SCADA_USERNAME=${SCADA_USERNAME}
      - SCADA_PASSWORD=${SCADA_PASSWORD}
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mte_lumen_network
    restart: unless-stopped
    command: celery -A core worker --loglevel=info

  # Beat de Celery para tareas programadas
  celery_beat:
    build: .
    container_name: mte_lumen_celery_beat
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - name_db=${name_db:-mte_lumen}
      - user_postgres=${user_postgres:-mte_user}
      - password_user_postgres=${password_user_postgres:-mte_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SCADA_USERNAME=${SCADA_USERNAME}
      - SCADA_PASSWORD=${SCADA_PASSWORD}
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mte_lumen_network
    restart: unless-stopped
    command: celery -A core beat --loglevel=info

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mte_lumen_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mte_lumen_network
    restart: unless-stopped

  # Nginx como proxy reverso (opcional)
  nginx:
    image: nginx:alpine
    container_name: mte_lumen_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - mte_lumen_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  mte_lumen_network:
    driver: bridge
