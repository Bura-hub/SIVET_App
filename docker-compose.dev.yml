version: '3.8'

services:
  # Base de datos PostgreSQL para desarrollo
  postgres:
    image: postgres:15-alpine
    container_name: mte_lumen_postgres_dev
    environment:
      POSTGRES_DB: ${name_db:-mte_lumen_dev}
      POSTGRES_USER: ${user_postgres:-mte_user_dev}
      POSTGRES_PASSWORD: ${password_user_postgres:-mte_password_dev}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mte_lumen_dev_network
    restart: unless-stopped

  # Redis para desarrollo
  redis:
    image: redis:7-alpine
    container_name: mte_lumen_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - mte_lumen_dev_network
    restart: unless-stopped

  # Backend Django para desarrollo
  backend:
    build: .
    container_name: mte_lumen_backend_dev
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - name_db=${name_db:-mte_lumen_dev}
      - user_postgres=${user_postgres:-mte_user_dev}
      - password_user_postgres=${password_user_postgres:-mte_password_dev}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SCADA_USERNAME=${SCADA_USERNAME:-dev_user}
      - SCADA_PASSWORD=${SCADA_PASSWORD:-dev_password}
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    volumes:
      - .:/app
      - static_dev_volume:/app/staticfiles
      - media_dev_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - mte_lumen_dev_network
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
              python manage.py collectstatic --noinput &&
              python manage.py runserver 0.0.0.0:8000"

  # Worker de Celery para desarrollo
  celery_worker:
    build: .
    container_name: mte_lumen_celery_worker_dev
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - name_db=${name_db:-mte_lumen_dev}
      - user_postgres=${user_postgres:-mte_user_dev}
      - password_user_postgres=${password_user_postgres:-mte_password_dev}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SCADA_USERNAME=${SCADA_USERNAME:-dev_user}
      - SCADA_PASSWORD=${SCADA_PASSWORD:-dev_password}
    volumes:
      - .:/app
      - static_dev_volume:/app/staticfiles
      - media_dev_volume:/app/media
    depends_on:
      - postgres
      - redis
    networks:
      - mte_lumen_dev_network
    restart: unless-stopped
    command: celery -A core worker --loglevel=debug

  # Beat de Celery para desarrollo
  celery_beat:
    build: .
    container_name: mte_lumen_celery_beat_dev
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - name_db=${name_db:-mte_lumen_dev}
      - user_postgres=${user_postgres:-mte_user_dev}
      - password_user_postgres=${password_user_postgres:-mte_password_dev}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SCADA_USERNAME=${SCADA_USERNAME:-dev_user}
      - SCADA_PASSWORD=${SCADA_PASSWORD:-dev_password}
    volumes:
      - .:/app
      - static_dev_volume:/app/staticfiles
      - media_dev_volume:/app/media
    depends_on:
      - postgres
      - redis
    networks:
      - mte_lumen_dev_network
    restart: unless-stopped
    command: celery -A core beat --loglevel=debug

volumes:
  postgres_dev_data:
  redis_dev_data:
  static_dev_volume:
  media_dev_volume:

networks:
  mte_lumen_dev_network:
    driver: bridge
