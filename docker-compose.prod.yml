version: '3.8'

services:
  # Base de datos PostgreSQL para producción
  postgres:
    image: postgres:15-alpine
    container_name: mte_lumen_postgres_prod
    environment:
      POSTGRES_DB: ${name_db}
      POSTGRES_USER: ${user_postgres}
      POSTGRES_PASSWORD: ${password_user_postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - mte_lumen_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${user_postgres} -d ${name_db}"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Redis para producción
  redis:
    image: redis:7-alpine
    container_name: mte_lumen_redis_prod
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mte_lumen_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Backend Django para producción
  backend:
    build: .
    container_name: mte_lumen_backend_prod
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - name_db=${name_db}
      - user_postgres=${user_postgres}
      - password_user_postgres=${password_user_postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SCADA_USERNAME=${SCADA_USERNAME}
      - SCADA_PASSWORD=${SCADA_PASSWORD}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mte_lumen_network
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
              python manage.py collectstatic --noinput &&
              gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class gevent"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Worker de Celery para producción
  celery_worker:
    build: .
    container_name: mte_lumen_celery_worker_prod
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - name_db=${name_db}
      - user_postgres=${user_postgres}
      - password_user_postgres=${password_user_postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SCADA_USERNAME=${SCADA_USERNAME}
      - SCADA_PASSWORD=${SCADA_PASSWORD}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mte_lumen_network
    restart: unless-stopped
    command: celery -A core worker --loglevel=info --concurrency=4
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Beat de Celery para producción
  celery_beat:
    build: .
    container_name: mte_lumen_celery_beat_prod
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - name_db=${name_db}
      - user_postgres=${user_postgres}
      - password_user_postgres=${password_user_postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SCADA_USERNAME=${SCADA_USERNAME}
      - SCADA_PASSWORD=${SCADA_PASSWORD}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mte_lumen_network
    restart: unless-stopped
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Frontend React para producción
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mte_lumen_frontend_prod
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mte_lumen_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Nginx como proxy reverso para producción
  nginx:
    image: nginx:alpine
    container_name: mte_lumen_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - mte_lumen_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  mte_lumen_network:
    driver: bridge
